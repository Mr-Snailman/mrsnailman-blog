server {
  listen 80;
  server_name thoughtfulbrew.com;
  location / {
    return 301 https://$host$request_uri;
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot/;
  }
}

server {
  listen 443 ssl;
  server_name thoughtfulbrew.com;
  root /usr/share/nginx/html;
  index index.html index.htm;
  location ~* \.(?:css|js|map|jpe?g|gif|png|ico|json|woff|woff2|ttf)$ { }
  location / {
    try_files $uri /index.html;
  }
  client_max_body_size 100M;
  ssl_certificate /etc/letsencrypt/live/thoughtfulbrew.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/thoughtfulbrew.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  gzip on;
  gzip_disable "msie6";
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_min_length 0;
  gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype;
}

